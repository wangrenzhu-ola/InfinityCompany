# =============================================================================
# OpenViking Skill 配置模板
# =============================================================================
# 使用说明：
# 1. 复制此文件为 config.yaml
# 2. 填写所有标记为 [REQUIRED] 的配置项
# 3. 根据需要调整可选配置
# =============================================================================

# =============================================================================
# Notion 配置
# =============================================================================
notion:
  # ---------------------------------------------------------------------------
  # API Key [REQUIRED]
  # ---------------------------------------------------------------------------
  # 从 Notion Integration 页面获取
  # URL: https://www.notion.so/my-integrations
  # 格式: ntn_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  api_key: "<YOUR_NOTION_API_KEY>"
  
  # ---------------------------------------------------------------------------
  # 数据库 ID 映射 [REQUIRED]
  # ---------------------------------------------------------------------------
  # 创建数据库后，从 Notion URL 获取数据库 ID
  # URL 格式: https://www.notion.so/workspace/{DATABASE_ID}?v=...
  databases:
    external_requirements: ""  # 外部需求看板 - 存储外部客户/合作伙伴的需求
    requirements: ""           # 需求看板 - 内部需求管理
    iteration: ""              # 迭代看板 - Sprint/Iteration 管理
    bug_tracking: ""           # Bug 看板 - 缺陷跟踪
    retrospective: ""          # 每日复盘 - 团队复盘记录
  
  # ---------------------------------------------------------------------------
  # 同步配置
  # ---------------------------------------------------------------------------
  sync:
    # 是否启用自动同步
    enabled: true
    
    # 自动同步间隔（分钟）
    # 建议值: 30-120 分钟
    # 设为 0 则禁用自动同步，仅手动触发
    interval_minutes: 60
    
    # 同步方向
    # 可选值: 
    #   - "bidirectional": 双向同步（默认）
    #   - "notion_to_openviking": 仅从 Notion 同步到 OpenViking
    #   - "openviking_to_notion": 仅从 OpenViking 同步到 Notion
    direction: "bidirectional"
    
    # 批处理大小
    # 每批处理的记录数，影响同步速度和内存占用
    batch_size: 100
    
    # 冲突解决策略
    # 可选值:
    #   - "notion_wins": Notion 数据优先（默认，推荐）
    #   - "openviking_wins": OpenViking 数据优先
    #   - "timestamp_wins": 时间戳最新的优先
    #   - "manual": 手动解决冲突
    conflict_resolution: "notion_wins"
    
    # 增量同步开关
    # true: 只同步上次同步后变更的数据（推荐）
    # false: 每次都全量同步
    incremental: true
    
    # 上次同步时间戳（自动维护，无需手动修改）
    last_sync_timestamp: ""
    
    # -------------------------------------------------------------------------
    # 同步过滤器
    # -------------------------------------------------------------------------
    filters:
      # 状态过滤器
      status:
        # 包含的状态（空列表表示包含所有）
        include: []
        # 排除的状态
        exclude: ["Archived", "Cancelled", "Done"]
      
      # 只同步最近 N 天更新的记录
      # 设为 0 表示同步所有记录
      updated_within_days: 30
    
    # -------------------------------------------------------------------------
    # 字段映射配置
    # -------------------------------------------------------------------------
    # OpenViking 字段名 : Notion 数据库字段名
    field_mapping:
      title: "Name"
      status: "Status"
      priority: "Priority"
      assignee: "Assignee"
      tags: "Tags"
      description: "Description"
      created_at: "Created time"
      updated_at: "Last edited time"
    
    # 按数据库自定义字段映射
    # 优先级高于全局 field_mapping
    database_mapping:
      bug_tracking:
        severity: "Severity"
        root_cause: "Root Cause"
        solution: "Solution"
        reproducible: "Reproducible"
      retrospective:
        date: "Date"
        participants: "Participants"
        key_learnings: "Key Learnings"
        action_items: "Action Items"
      iteration:
        sprint_number: "Sprint"
        start_date: "Start Date"
        end_date: "End Date"
        goal: "Sprint Goal"
    
    # -------------------------------------------------------------------------
    # Webhook 配置（可选）
    # -------------------------------------------------------------------------
    # 如需实时同步，配置接收 Notion Webhook 的地址
    webhook_url: ""            # 例如: "https://your-server.com/webhook/notion"
    webhook_secret: ""         # Webhook 签名密钥，用于验证请求来源
    webhook_port: 5000         # 本地 Webhook 服务端口

# =============================================================================
# OpenViking 存储配置
# =============================================================================
storage:
  # ---------------------------------------------------------------------------
  # 本地存储路径
  # ---------------------------------------------------------------------------
  # 支持相对路径（相对于工作目录）或绝对路径
  # 建议值:
  #   - Linux/macOS: "/var/lib/openviking" 或 "~/.local/share/openviking"
  #   - Windows: "%APPDATA%\openviking"
  local_path: "./data/openviking"
  
  # ---------------------------------------------------------------------------
  # 向量数据库配置（可选）
  # ---------------------------------------------------------------------------
  # 用于语义搜索和相似度匹配
  vector_db:
    # 是否启用向量数据库
    enabled: false
    
    # 向量数据库提供商
    # 可选值: "chroma", "pinecone", "weaviate", "milvus"
    provider: "chroma"
    
    # 连接字符串
    # Chroma: 本地路径或 HTTP 地址
    # Pinecone: API endpoint
    # Weaviate: gRPC/HTTP 地址
    connection_string: ""
    
    # 向量维度（根据使用的 embedding 模型）
    # OpenAI text-embedding-3-small: 1536
    # OpenAI text-embedding-3-large: 3072
    # HuggingFace all-MiniLM-L6-v2: 384
    dimension: 1536
    
    # 相似度度量
    # 可选值: "cosine", "euclidean", "dotproduct"
    distance_metric: "cosine"
    
    # 集合/索引名称
    collection_name: "openviking_memories"
    
    # Pinecone 特定配置
    pinecone:
      api_key: ""
      environment: ""          # 例如: "us-west1-gcp"
      index_name: "openviking"
    
    # Weaviate 特定配置
    weaviate:
      url: ""
      api_key: ""
      class_name: "Memory"
  
  # ---------------------------------------------------------------------------
  # 备份配置
  # ---------------------------------------------------------------------------
  backup:
    # 是否启用自动备份
    enabled: true
    
    # 备份计划（Cron 表达式）
    # 格式: 分 时 日 月 星期
    # "0 2 * * *" = 每天凌晨 2 点
    schedule: "0 2 * * *"
    
    # 备份保留天数
    # 超过此时间的备份将被自动删除
    retention_days: 30
    
    # 备份存储路径
    backup_path: "./backups/openviking"
    
    # 是否启用压缩
    compression: true
    
    # 压缩格式: "gz", "bz2", "xz"
    compression_format: "gz"
    
    # 是否启用加密（可选）
    encrypt: false
    
    # 加密密钥文件路径（如启用加密则必需）
    encryption_key_file: ""
    
    # 备份前是否执行数据完整性检查
    verify_before_backup: true
    
    # 备份包含的文件
    include:
      - memories/           # 原始记忆数据
      - vectors/            # 向量索引
      - cache/              # 缓存（可选，可设为 false 减少备份大小）
      - metadata.db         # SQLite 元数据
      - config.yaml         # 配置文件

# =============================================================================
# 记忆配置
# =============================================================================
memory:
  # ---------------------------------------------------------------------------
  # 记忆分类
  # ---------------------------------------------------------------------------
  # 定义支持的的记忆类别，可根据团队需求扩展
  categories:
    - name: "decision"         # 决策记录
      description: "重要决策及其依据"
      icon: "🎯"
    - name: "tech_design"      # 技术方案
      description: "技术设计和架构方案"
      icon: "📐"
    - name: "bug_analysis"     # Bug 根因分析
      description: "Bug 根因分析和解决方案"
      icon: "🐛"
    - name: "retrospective"    # 复盘记录
      description: "团队复盘会议记录"
      icon: "📝"
    - name: "context"          # 上下文信息
      description: "会话和任务上下文"
      icon: "💬"
    - name: "meeting"          # 会议纪要
      description: "重要会议记录"
      icon: "👥"
    - name: "research"         # 调研结果
      description: "技术调研和分析报告"
      icon: "🔬"
  
  # ---------------------------------------------------------------------------
  # 记忆保留策略
  # ---------------------------------------------------------------------------
  retention:
    # 默认保留天数
    default_days: 90
    
    # 按类别设置保留策略
    categories:
      decision: 365            # 决策记录保留 1 年
      tech_design: 180         # 技术方案保留 6 个月
      bug_analysis: 365        # Bug 分析保留 1 年
      retrospective: 180       # 复盘记录保留 6 个月
      context: 30              # 上下文保留 1 个月
      meeting: 90              # 会议纪要保留 3 个月
      research: 365            # 调研结果保留 1 年
    
    # 归档配置
    # 过期记忆不直接删除，先归档
    archive:
      enabled: true
      archive_path: "./data/openviking/archives"
      compress_after_days: 30  # 归档 30 天后压缩
  
  # ---------------------------------------------------------------------------
  # 记忆提取配置
  # ---------------------------------------------------------------------------
  extraction:
    # 自动提取开关
    auto_extract: true
    
    # 提取触发条件
    triggers:
      # 达到最小字符数时提取
      min_length: 100
      # 包含关键词时提取
      keywords:
        - "决策"
        - "方案"
        - "决定"
        - "Bug"
        - "问题"
        - "复盘"
        - "总结"
    
    # 摘要生成
    summarization:
      enabled: true
      max_length: 200          # 摘要最大长度
      language: "zh"           # 摘要语言: "zh", "en"

# =============================================================================
# 日志配置
# =============================================================================
logging:
  # 日志级别
  # 可选值: "DEBUG", "INFO", "WARNING", "ERROR"
  # DEBUG: 开发调试，包含所有详细信息
  # INFO: 正常运行信息（推荐）
  # WARNING: 仅警告和错误
  # ERROR: 仅错误
  level: "INFO"
  
  # 日志文件路径
  file: "./logs/openviking.log"
  
  # 日志文件最大大小（MB）
  # 超过此大小将自动轮转
  max_size_mb: 10
  
  # 保留的备份文件数
  backup_count: 5
  
  # 日志格式
  # 可用变量:
  #   %(asctime)s    - 时间戳
  #   %(name)s       - 记录器名称
  #   %(levelname)s  - 日志级别
  #   %(message)s    - 日志消息
  #   %(filename)s   - 文件名
  #   %(lineno)d     - 行号
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
  # 日期格式
  date_format: "%Y-%m-%d %H:%M:%S"
  
  # 是否输出到控制台
  console_output: true
  
  # 是否启用 JSON 格式（便于日志收集系统解析）
  json_format: false
  
  # 单独的组件日志配置
  components:
    sync:
      level: "INFO"
      file: "./logs/sync.log"
    notion:
      level: "INFO"
      file: "./logs/notion.log"
    memory:
      level: "INFO"
      file: "./logs/memory.log"

# =============================================================================
# Agent 配置
# =============================================================================
agents:
  # ---------------------------------------------------------------------------
  # 启用记忆增强的角色
  # ---------------------------------------------------------------------------
  # 只有在此列表中的角色才能访问 OpenViking 记忆
  enabled_roles:
    - pmo                    # PMO - 项目管理办公室
    - architect              # 架构师
    - developer              # 开发工程师
    - devops                 # DevOps 工程师
    - qa                     # 测试工程师
    - designer               # 设计师
    - pm                     # 产品经理
    - knowledge_manager      # 知识管理员
    - external_assistant     # 外部助手
    - personal_assistant     # 个人助手
  
  # ---------------------------------------------------------------------------
  # 角色权限配置
  # ---------------------------------------------------------------------------
  permissions:
    pmo:
      read_categories: ["*"]           # * 表示所有类别
      write_categories: ["decision", "retrospective"]
    architect:
      read_categories: ["*"]
      write_categories: ["tech_design", "decision", "research"]
    developer:
      read_categories: ["tech_design", "bug_analysis", "context", "decision"]
      write_categories: ["bug_analysis", "context"]
    devops:
      read_categories: ["*"]
      write_categories: ["tech_design", "bug_analysis", "context"]
    qa:
      read_categories: ["tech_design", "bug_analysis", "context"]
      write_categories: ["bug_analysis"]
    designer:
      read_categories: ["tech_design", "context", "decision"]
      write_categories: ["context"]
    pm:
      read_categories: ["*"]
      write_categories: ["decision", "context", "meeting"]
    knowledge_manager:
      read_categories: ["*"]
      write_categories: ["*"]           # 知识管理员拥有所有权限
    external_assistant:
      read_categories: ["context"]
      write_categories: []
    personal_assistant:
      read_categories: ["*"]
      write_categories: ["context"]
  
  # ---------------------------------------------------------------------------
  # 记忆检索配置
  # ---------------------------------------------------------------------------
  retrieval:
    # 默认返回的记忆数量
    default_limit: 10
    
    # 最大返回数量
    max_limit: 100
    
    # 相似度阈值（0-1，越高要求越严格）
    similarity_threshold: 0.7
    
    # 时间衰减权重
    # 越新的记忆权重越高
    recency_weight: 0.3
    
    # 启用上下文关联
    context_aware: true

# =============================================================================
# 安全配置
# =============================================================================
security:
  # API 密钥加密存储
  encrypt_api_keys: true
  
  # 密钥文件路径
  key_file: "~/.config/openviking/.key"
  
  # 访问控制
  access_control:
    enabled: false
    allowed_ips: []            # 允许访问的 IP 列表
    
  # 审计日志
  audit_log:
    enabled: true
    file: "./logs/audit.log"
    events:
      - "memory_read"
      - "memory_write"
      - "memory_delete"
      - "sync_start"
      - "config_change"

# =============================================================================
# 性能配置
# =============================================================================
performance:
  # 缓存配置
  cache:
    enabled: true
    type: "memory"             # memory, redis, disk
    ttl_seconds: 3600          # 缓存过期时间
    max_size: 1000             # 最大缓存条目数
  
  # 并发配置
  concurrency:
    max_workers: 4             # 最大并发工作线程
    notion_api_rate_limit: 3   # Notion API 每秒请求数限制
  
  # 数据库连接池
  database:
    pool_size: 5
    max_overflow: 10
    pool_timeout: 30

# =============================================================================
# 通知配置（可选）
# =============================================================================
notifications:
  # 同步完成通知
  sync:
    enabled: false
    on_success: false
    on_failure: true
    on_conflict: true
  
  # 备份通知
  backup:
    enabled: false
    on_success: true
    on_failure: true
  
  # 通知渠道
  channels:
    slack:
      webhook_url: ""
      channel: "#openviking-alerts"
    email:
      smtp_host: ""
      smtp_port: 587
      username: ""
      password: ""
      from: "openviking@your-company.com"
      to: ["admin@your-company.com"]

# =============================================================================
# 开发/调试配置
# =============================================================================
development:
  # 调试模式
  debug: false
  
  # 模拟模式（不实际调用 Notion API）
  mock_mode: false
  
  # 测试数据
  test_data:
    enabled: false
    sample_size: 100
  
  # 性能分析
  profiling:
    enabled: false
    output_dir: "./profiling"

# =============================================================================
# 版本信息（请勿修改）
# =============================================================================
version: "1.0.0"
config_schema_version: "1.0"
